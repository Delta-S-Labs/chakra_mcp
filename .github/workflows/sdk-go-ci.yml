name: SDK Go CI

on:
  push:
    branches: [main]
    paths:
      - "sdks/go/**"
      - ".github/workflows/sdk-go-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdks/go/**"
      - ".github/workflows/sdk-go-ci.yml"

concurrency:
  group: sdk-go-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Vet + test (go ${{ matrix.go-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23"]
    defaults:
      run:
        working-directory: sdks/go
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: sdks/go/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...
