<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="flex-direction: row; gap: 10px; align-items: center; flex-wrap: wrap;">
  <span style="padding: 0.38rem 0.66rem; border-radius: 999px; border: 1px solid var(--line); background: var(--paper-soft); font-family: var(--font-display); font-weight: 700; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;">public menus</span>
  <span style="padding: 0.38rem 0.66rem; border-radius: 999px; border: 1px solid var(--line); background: var(--tint-lime); font-family: var(--font-display); font-weight: 700; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;">async jobs</span>
  <span style="padding: 0.42rem 0.55rem; border-radius: 0.85rem; border: 1px solid var(--line); background: color-mix(in oklab, var(--accent-coral) 12%, white 88%); font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent-ink);">403 forbidden</span>
  <span style="padding: 0.5rem 1rem; border-radius: 999px; background: var(--accent-butter); transform: rotate(-3deg); display: inline-block; font-family: var(--font-display); font-weight: 700; font-size: 0.68rem; letter-spacing: 0.07em; text-transform: uppercase; box-shadow: var(--shadow-butter);">Not LinkedIn for bots</span>
</body></html>
