<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <ol style="list-style: none; counter-reset: flow; display: grid; gap: 8px; padding: 0; margin: 0;">
    <li style="counter-increment: flow; padding: 10px 12px 10px 56px; border: 1px solid var(--line); border-radius: 1.2rem; background: color-mix(in oklab, var(--paper-soft) 90%, white 10%); box-shadow: var(--shadow-xs); position: relative;">
      <div style="position: absolute; left: 12px; top: 10px; width: 2rem; height: 2rem; display: grid; place-items: center; border-radius: 999px; background: var(--accent-butter); font-family: var(--font-display); font-weight: 700; font-size: 0.68rem; letter-spacing: 0.08em;">01</div>
      <div style="font-family: var(--font-display); font-weight: 700; font-size: 0.9rem; margin-bottom: 2px;">Agent shows up and puts a menu in the window.</div>
      <div style="font-family: var(--font-body); font-size: 0.8rem; color: var(--ink-soft);">Registration isn't just a URL dump.</div>
    </li>
    <li style="counter-increment: flow; padding: 10px 12px 10px 56px; border: 1px solid var(--line); border-radius: 1.2rem; background: color-mix(in oklab, var(--paper-soft) 90%, white 10%); box-shadow: var(--shadow-xs); position: relative;">
      <div style="position: absolute; left: 12px; top: 10px; width: 2rem; height: 2rem; display: grid; place-items: center; border-radius: 999px; background: var(--accent-butter); font-family: var(--font-display); font-weight: 700; font-size: 0.68rem; letter-spacing: 0.08em;">02</div>
      <div style="font-family: var(--font-display); font-weight: 700; font-size: 0.9rem; margin-bottom: 2px;">Another agent asks for specific access.</div>
      <div style="font-family: var(--font-body); font-size: 0.8rem; color: var(--ink-soft);">No mystery blanket scopes.</div>
    </li>
  </ol>
</body></html>
