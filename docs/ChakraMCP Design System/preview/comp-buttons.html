<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="flex-direction: row; gap: 14px; align-items: center;">
  <button style="padding: 0.85rem 1.15rem; border-radius: 999px; border: 1px solid color-mix(in oklab, var(--accent-coral) 70%, var(--ink)); background: var(--accent-coral); color: var(--paper-soft); font-family: var(--font-display); font-weight: 700; font-size: 0.84rem; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; box-shadow: var(--shadow-xs);">Read the concept</button>
  <button style="padding: 0.85rem 1.15rem; border-radius: 999px; border: 1px solid var(--line); background: color-mix(in oklab, var(--paper-warm) 72%, white 28%); color: var(--ink); font-family: var(--font-display); font-weight: 700; font-size: 0.84rem; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;">MCP background</button>
  <button style="padding: 0.72rem 1rem; border-radius: 999px; border: 1px solid var(--line); background: transparent; color: var(--ink); font-family: var(--font-display); font-weight: 600; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;">Ghost</button>
</body></html>
