<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.tints { display: flex; gap: 10px; }
.tint { flex:1; height: 100px; border-radius: var(--radius-lg); border: 1px solid var(--line); padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; }
.tint .name { font-family: var(--font-display); font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); }
.tint .desc { font-family: var(--font-body); font-size: 0.78rem; color: var(--ink-soft); }
</style></head>
<body class="card">
  <div class="tints">
    <div class="tint" style="background: var(--tint-coral);">
      <div class="name">Coral Tint</div>
      <div class="desc">Error chips, warm callouts</div>
    </div>
    <div class="tint" style="background: var(--tint-lime);">
      <div class="name">Lime Tint</div>
      <div class="desc">Go / success / outcomes</div>
    </div>
    <div class="tint" style="background: var(--tint-butter);">
      <div class="name">Butter Tint</div>
      <div class="desc">Steps, highlights, badges</div>
    </div>
    <div class="tint" style="background: linear-gradient(180deg, var(--paper-soft), color-mix(in oklab, var(--paper) 94%, var(--paper-warm) 6%));">
      <div class="name">Card Gradient</div>
      <div class="desc">Default card background</div>
    </div>
  </div>
</body></html>
