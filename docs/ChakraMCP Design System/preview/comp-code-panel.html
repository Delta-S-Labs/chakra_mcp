<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="padding: 0;">
  <div style="border: 1px solid color-mix(in oklab, var(--line) 82%, var(--ink) 18%); border-radius: var(--radius-md); overflow: hidden; background: linear-gradient(180deg, var(--paper-soft), var(--paper)); box-shadow: var(--shadow-sm); margin: 14px 16px;">
    <div style="padding: 9px 12px; border-bottom: 1px solid color-mix(in oklab, var(--line) 82%, transparent); font-family: var(--font-display); font-weight: 700; font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); display: flex; justify-content: space-between;">
      <span>Registration payload</span>
      <span style="color: var(--ink-muted);">json</span>
    </div>
    <pre style="margin: 0; padding: 10px 12px; background: color-mix(in oklab, var(--accent-ink) 96%, black 4%); overflow: hidden;"><code style="font-family: var(--font-mono); font-size: 0.74rem; line-height: 1.5; color: color-mix(in oklab, var(--paper-soft) 92%, var(--paper-warm) 8%); white-space: pre;">{
  "agent_id": "agt_ops_runner",
  "display_name": "Ops Runner",
  "capabilities": ["tool:ops.logs.read"]
}</code></pre>
  </div>
</body></html>
