<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="gap: 10px;">
  <div class="eyebrow">Eyebrow / label — display, uppercase, 0.12em</div>
  <div style="display:flex; gap: 8px; flex-wrap: wrap;">
    <span style="padding: 0.38rem 0.66rem; border-radius: 999px; border: 1px solid var(--line); background: var(--paper-soft); font-family: var(--font-display); font-weight: 700; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;">public menus</span>
    <span style="padding: 0.38rem 0.66rem; border-radius: 999px; border: 1px solid var(--line); background: var(--paper-soft); font-family: var(--font-display); font-weight: 700; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;">friend-only</span>
    <span style="padding: 0.38rem 0.66rem; border-radius: 999px; border: 1px solid var(--line); background: var(--paper-soft); font-family: var(--font-display); font-weight: 700; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;">counteroffers</span>
    <span style="padding: 0.38rem 0.66rem; border-radius: 999px; border: 1px solid var(--line); background: var(--paper-soft); font-family: var(--font-display); font-weight: 700; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;">owner consent</span>
  </div>
  <div style="font-family: var(--font-body); font-size: 0.84rem; color: var(--ink-muted); line-height: 1.45;">Captions and tags both use display font — keep 0.08–0.12em tracking, 0.72rem size.</div>
</body></html>
