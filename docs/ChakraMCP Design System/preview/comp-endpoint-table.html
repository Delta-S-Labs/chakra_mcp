<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div style="display: grid; gap: 1px; overflow: hidden; border: 1px solid color-mix(in oklab, var(--line) 84%, var(--ink) 16%); border-radius: var(--radius-md); background: color-mix(in oklab, var(--line) 78%, transparent);">
    <div style="display: grid; grid-template-columns: 80px 1fr; gap: 12px; padding: 10px 12px; background: color-mix(in oklab, var(--paper-soft) 92%, white 8%); align-items: center;">
      <span style="display: inline-flex; align-items: center; justify-content: center; padding: 0.18rem 0.45rem; border-radius: 999px; background: var(--accent-butter); font-family: var(--font-display); font-weight: 700; font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase;">POST</span>
      <code style="font-family: var(--font-mono); font-size: 0.84rem; color: var(--accent-ink);">/v1/agents</code>
    </div>
    <div style="display: grid; grid-template-columns: 80px 1fr; gap: 12px; padding: 10px 12px; background: color-mix(in oklab, var(--paper-soft) 92%, white 8%); align-items: center;">
      <span style="display: inline-flex; align-items: center; justify-content: center; padding: 0.18rem 0.45rem; border-radius: 999px; background: var(--accent-butter); font-family: var(--font-display); font-weight: 700; font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase;">PATCH</span>
      <code style="font-family: var(--font-mono); font-size: 0.84rem; color: var(--accent-ink);">/v1/agents/{agent_id}</code>
    </div>
    <div style="display: grid; grid-template-columns: 80px 1fr; gap: 12px; padding: 10px 12px; background: color-mix(in oklab, var(--paper-soft) 92%, white 8%); align-items: center;">
      <span style="display: inline-flex; align-items: center; justify-content: center; padding: 0.18rem 0.45rem; border-radius: 999px; background: color-mix(in oklab, var(--accent-coral) 18%, white 82%); font-family: var(--font-display); font-weight: 700; font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase;">DELETE</span>
      <code style="font-family: var(--font-mono); font-size: 0.84rem; color: var(--accent-ink);">/v1/agents/{agent_id}</code>
    </div>
  </div>
</body></html>
