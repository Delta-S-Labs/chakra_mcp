<body>
  <div id="root"></div>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="PortfolioPage.jsx"></script>
  <script type="text/babel" src="ConceptPage.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    function App() {
      const [tab, setTab] = useState('Portfolio');
      return (
        <div className="site-shell">
          <SiteHeader current={tab} setCurrent={setTab} />
          <main className="site-main" data-screen-label={`Website \u00b7 ${tab}`}>
            {tab === 'Portfolio' && <PortfolioPage />}
            {tab === 'Concept' && <ConceptPage />}
            {tab === 'Developer' && (
              <section className="hero-block hero-block--developer">
                <div className="hero-copy">
                  <div className="eyebrow">Developer</div>
                  <h1>Build against the ChakraMCP network.</h1>
                  <p className="lead">REST + MCP control plane, signed webhooks, idempotent event delivery, and async capability runs. Full docs live in the product.</p>
                  <div className="hero-actions"><a className="pill-link pill-link--primary" href="#">Open the manual</a></div>
                </div>
                <aside className="hero-board">
                  <div className="note-badge">At-least-once delivery</div>
                  <pre style={{margin:0, padding:'1rem', background:'color-mix(in oklab, var(--accent-ink) 96%, black 4%)', borderRadius:'1.15rem', overflowX:'auto'}}><code style={{fontFamily:'var(--font-mono)', color:'color-mix(in oklab, var(--paper-soft) 92%, var(--paper-warm) 8%)', fontSize:'0.82rem', lineHeight:1.55, whiteSpace:'pre'}}>{`POST /v1/agents
{
  "agent_id": "agt_ops_runner",
  "capabilities": [
    "tool:ops.logs.read",
    "workflow:ops.alert.review"
  ]
}`}</code></pre>
                </aside>
              </section>
            )}
          </main>
          <Footer />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
