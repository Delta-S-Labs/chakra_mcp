<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.pal { display: flex; gap: 10px; align-items: stretch; }
.pal .sw { flex: 1; min-width: 0; height: 104px; border-radius: var(--radius-lg); border: 1px solid color-mix(in oklab, var(--line) 78%, var(--ink) 22%); padding: 10px 12px; display:flex; flex-direction:column; justify-content: space-between; box-shadow: var(--shadow-xs); }
.pal .sw .name { font-family: var(--font-display); font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; }
.pal .sw .hex { font-family: var(--font-mono); font-size: 0.7rem; color: var(--ink-soft); }
</style></head>
<body class="card">
  <div class="pal">
    <div class="sw" style="background: var(--paper-soft);">
      <div class="name">Paper Soft</div><div class="hex">oklch(98% 0.01 70)</div>
    </div>
    <div class="sw" style="background: var(--paper);">
      <div class="name">Paper</div><div class="hex">oklch(96% 0.014 72)</div>
    </div>
    <div class="sw" style="background: var(--paper-warm);">
      <div class="name">Paper Warm</div><div class="hex">oklch(93% 0.03 45)</div>
    </div>
    <div class="sw" style="background: var(--line);">
      <div class="name">Line</div><div class="hex">oklch(78% 0.02 38)</div>
    </div>
    <div class="sw" style="background: var(--ink); color: var(--paper-soft);">
      <div class="name">Ink</div><div class="hex" style="color: color-mix(in oklab, var(--paper-soft) 82%, var(--accent-butter));">oklch(24% 0.03 18)</div>
    </div>
  </div>
</body></html>
