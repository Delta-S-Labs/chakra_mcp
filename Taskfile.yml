# ChakraMCP — task runner.
#
# Everything a developer needs to do should run through `task` (https://taskfile.dev).
# Install once: `brew install go-task` (macOS) or see https://taskfile.dev/installation.
# Then `task --list` for the menu.

version: "3"

dotenv:
  - .env
  - .env.local

vars:
  FRONTEND_DIR: frontend
  BACKEND_DIR: backend
  RENDER_DIR: tools/render-coffee-loop
  PROD_URL: https://chakra-mcp.netlify.app

tasks:
  default:
    desc: Show all available tasks
    cmds:
      - task --list
    silent: true

  # ─── Setup ────────────────────────────────────────────────

  install:
    desc: Install all dependencies (frontend + tooling)
    cmds:
      - task: install:frontend
      - task: install:render-tool
      - 'echo "Dependencies installed. Run task dev:all to start everything."'

  install:frontend:
    desc: Install frontend dependencies via pnpm
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm install --frozen-lockfile=false

  install:render-tool:
    desc: Install Playwright + ffmpeg dependencies for the render pipeline
    dir: "{{.RENDER_DIR}}"
    cmds:
      - pnpm install --frozen-lockfile=false
      - pnpm exec playwright install chromium

  # ─── Local development ────────────────────────────────────

  dev:
    desc: Start the frontend dev server (http://localhost:3000)
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm dev

  dev:all:
    desc: Start Postgres + chakramcp-app backend + frontend (3 terminals via parallel)
    deps: [db:up]
    cmds:
      - 'echo "Postgres up on :5432. Now run task dev:backend in one terminal and task dev in another."'
      - 'echo "(future: combine into a single supervised process via overmind/foreman)"'

  dev:backend:
    desc: Run the chakramcp-app service (port APP_PORT, default 8080)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - cargo run -p chakramcp-app

  dev:relay:
    desc: Run the chakramcp-relay service (Phase 1.5, not yet scaffolded)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - 'echo "chakramcp-relay not scaffolded yet — Phase 1.5"'

  # ─── Database ────────────────────────────────────────────

  db:up:
    desc: Start local Postgres (Docker)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose up -d postgres
      - 'echo "postgres on localhost:5432 · db=chakramcp · user=chakramcp"'

  db:down:
    desc: Stop local Postgres (preserves data)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose down

  db:nuke:
    desc: Stop Postgres and delete all data
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose down -v

  db:psql:
    desc: Open psql against local Postgres
    cmds:
      - 'docker exec -it chakramcp-postgres psql -U chakramcp -d chakramcp'

  db:migrate:
    desc: Run pending migrations against local Postgres (sqlx)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - cargo run -p chakramcp-app -- --migrate-only 2>/dev/null || cargo run -p chakramcp-app & sleep 2; pkill -f chakramcp-app

  backend:check:
    desc: cargo check across the backend workspace (no build artifacts)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - cargo check --workspace

  backend:build:
    desc: cargo build (debug) across the backend workspace
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - cargo build --workspace

  backend:test:
    desc: cargo test across the backend workspace
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - cargo test --workspace

  # ─── Build & verify ───────────────────────────────────────

  build:
    desc: Build the whole project
    cmds:
      - task: build:frontend

  build:frontend:
    desc: Build the Next.js frontend (also runs typecheck)
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm build

  lint:
    desc: Lint all code
    cmds:
      - task: lint:frontend

  lint:frontend:
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm lint

  test:
    desc: Run all tests
    cmds:
      - task: test:frontend

  test:frontend:
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm exec tsc --noEmit
      - 'echo "(no frontend test suite yet — typecheck-only for now)"'

  # ─── Example agents ───────────────────────────────────────

  examples:install:
    desc: Install all three example agents (Python, Rust, TypeScript)
    cmds:
      - task: examples:install:py
      - task: examples:install:rust
      - task: examples:install:ts

  examples:install:py:
    desc: Install the Python LangChain example
    dir: examples/python-langchain
    cmds:
      - uv sync

  examples:install:rust:
    desc: Build the Rust rig example
    dir: examples/rust-rig
    cmds:
      - cargo build

  examples:install:ts:
    desc: Install the TypeScript Mastra example
    dir: examples/typescript-mastra
    cmds:
      - pnpm install --frozen-lockfile=false

  examples:py:
    desc: Run the Python LangChain example agent
    dir: examples/python-langchain
    cmds:
      - 'uv run agent {{.CLI_ARGS}}'

  examples:rust:
    desc: Run the Rust rig example agent
    dir: examples/rust-rig
    cmds:
      - 'cargo run --quiet -- {{.CLI_ARGS}}'

  examples:ts:
    desc: Run the TypeScript Mastra example agent
    dir: examples/typescript-mastra
    cmds:
      - 'pnpm agent {{.CLI_ARGS}}'

  # ─── Render pipeline ──────────────────────────────────────

  render:coffee-loop:
    desc: Re-render the (C) dispatch-log MP4/GIF using Playwright + ffmpeg
    cmds:
      - 'echo "Make sure task dev is running in another terminal."'
      - cd {{.RENDER_DIR}} && pnpm render

  # ─── Production checks ────────────────────────────────────

  prod:check:
    desc: Smoke-test all production URLs
    cmds:
      - |
        for path in / /concept /brand /cofounder /assets/coffee-loop.mp4 /robots.txt; do
          status=$(curl -sS -o /dev/null -w "%{http_code} %{size_download}B" "{{.PROD_URL}}$path")
          echo "$path  →  $status"
        done

  prod:robots:
    desc: Print the live /robots.txt
    cmds:
      - curl -sS {{.PROD_URL}}/robots.txt

  # ─── Auth helpers ────────────────────────────────────────

  auth:secret:
    desc: Print a fresh AUTH_SECRET (paste into frontend/.env.local)
    cmds:
      - 'openssl rand -base64 32'

  # ─── Skills ──────────────────────────────────────────────

  skills:list:
    desc: List all installed Claude Code skills
    cmds:
      - npx -y skills list

  skills:update:
    desc: Update all installed skills
    cmds:
      - npx -y skills update

  # ─── CI helpers ──────────────────────────────────────────

  ci:
    desc: Run the same checks CI does (lint, build)
    cmds:
      - task: lint
      - task: build

  # ─── Cleanup ─────────────────────────────────────────────

  clean:
    desc: Remove build outputs and caches (keeps node_modules)
    cmds:
      - rm -rf {{.FRONTEND_DIR}}/.next
      - rm -rf {{.RENDER_DIR}}/frames {{.RENDER_DIR}}/output
      - echo "✓ Cleaned build outputs."

  clean:deep:
    desc: Remove all node_modules and lockfile caches (forces a fresh install)
    cmds:
      - find . -name node_modules -type d -prune -exec rm -rf {} +
      - rm -rf {{.FRONTEND_DIR}}/.next {{.RENDER_DIR}}/frames {{.RENDER_DIR}}/output
      - echo "✓ Deep clean done. Run `task install` to restore."
