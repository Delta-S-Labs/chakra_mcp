name: SDK Python CI

on:
  push:
    branches: [main]
    paths:
      - "sdks/python/**"
      - ".github/workflows/sdk-py-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdks/python/**"
      - ".github/workflows/sdk-py-ci.yml"

concurrency:
  group: sdk-py-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint + typecheck + test (${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: sdks/python/pyproject.toml

      - run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Typecheck
        run: mypy src

      - name: Test
        run: pytest -v
