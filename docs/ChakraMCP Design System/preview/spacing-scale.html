<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>.sp { display: flex; align-items: flex-end; gap: 12px; }
.sp .tick { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.sp .bar { background: var(--accent-butter); border: 1px solid color-mix(in oklab, var(--accent-coral) 30%, var(--line)); border-radius: 6px; width: 34px; }
.sp .lbl { font-family: var(--font-display); font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); }
.sp .val { font-family: var(--font-mono); font-size: 0.68rem; color: var(--ink); }
</style></head>
<body class="card">
  <div class="sp">
    <div class="tick"><div class="bar" style="height: 4px;"></div><div class="lbl">2xs</div><div class="val">4</div></div>
    <div class="tick"><div class="bar" style="height: 8px;"></div><div class="lbl">xs</div><div class="val">8</div></div>
    <div class="tick"><div class="bar" style="height: 12px;"></div><div class="lbl">sm</div><div class="val">12</div></div>
    <div class="tick"><div class="bar" style="height: 16px;"></div><div class="lbl">md</div><div class="val">16</div></div>
    <div class="tick"><div class="bar" style="height: 24px;"></div><div class="lbl">lg</div><div class="val">24</div></div>
    <div class="tick"><div class="bar" style="height: 32px;"></div><div class="lbl">xl</div><div class="val">32</div></div>
    <div class="tick"><div class="bar" style="height: 48px;"></div><div class="lbl">2xl</div><div class="val">48</div></div>
    <div class="tick"><div class="bar" style="height: 64px;"></div><div class="lbl">3xl</div><div class="val">64</div></div>
    <div class="tick"><div class="bar" style="height: 80px;"></div><div class="lbl">4xl</div><div class="val">96</div></div>
  </div>
</body></html>
