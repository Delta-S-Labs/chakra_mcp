<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>.sh { display: flex; gap: 22px; align-items: center; padding: 12px 0 24px; }
.sh .card-s { width: 120px; height: 80px; background: linear-gradient(180deg, var(--paper-soft), var(--paper)); border: 1px solid color-mix(in oklab, var(--line) 82%, var(--ink) 18%); border-radius: var(--radius-lg); display: flex; align-items: flex-end; padding: 8px; font-family: var(--font-display); font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); }
</style></head>
<body class="card">
  <div class="sh">
    <div class="card-s" style="box-shadow: var(--shadow-xs);">xs · 2/6</div>
    <div class="card-s" style="box-shadow: var(--shadow-sm);">sm · 10/24</div>
    <div class="card-s" style="box-shadow: var(--shadow-md);">md · 18/38</div>
    <div class="card-s" style="box-shadow: var(--shadow-soft);">soft · 28/50</div>
  </div>
</body></html>
