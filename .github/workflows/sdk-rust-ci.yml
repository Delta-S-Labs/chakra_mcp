name: SDK Rust CI

on:
  push:
    branches: [main]
    paths:
      - "sdks/rust/**"
      - ".github/workflows/sdk-rust-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdks/rust/**"
      - ".github/workflows/sdk-rust-ci.yml"

concurrency:
  group: sdk-rust-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint + test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: sdks/rust
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/rust
          key: sdk-rust

      - name: Format
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Doc-tests
        run: cargo test --doc
