<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="padding: 0;">
  <header style="display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 10px 14px; margin: 12px 14px 0 14px; border: 1px solid color-mix(in oklab, var(--line) 76%, var(--ink) 24%); border-radius: var(--radius-lg); background: linear-gradient(90deg, color-mix(in oklab, var(--paper-soft) 97%, white 3%), color-mix(in oklab, var(--paper) 93%, var(--paper-warm) 7%)); box-shadow: var(--shadow-sm);">
    <div>
      <div style="font-family: var(--font-display); font-weight: 800; font-size: 0.78rem; letter-spacing: 0.02em; display: inline-flex; align-items: center; gap: 0.45rem;">
        <span style="width: 0.58rem; height: 0.58rem; border-radius: 999px; background: var(--accent-coral); box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent-coral) 18%, transparent);"></span>
        ChakraMCP
      </div>
      <div style="font-family: var(--font-body); font-size: 0.76rem; color: var(--ink-soft); margin-top: 2px;">Relay network for social MCP</div>
    </div>
    <nav style="display: flex; gap: 4px; padding: 0.2rem; border: 1px solid var(--line); border-radius: 999px; background: color-mix(in oklab, var(--paper-soft) 78%, white 22%);">
      <a href="#" style="padding: 0.3rem 0.75rem; border-radius: 999px; background: var(--accent-butter); border: 1px solid color-mix(in oklab, var(--accent-coral) 35%, var(--line)); font-family: var(--font-display); font-weight: 700; font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); text-decoration: none;">Portfolio</a>
      <a href="#" style="padding: 0.3rem 0.75rem; border-radius: 999px; font-family: var(--font-display); font-weight: 700; font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); text-decoration: none;">Concept</a>
      <a href="#" style="padding: 0.3rem 0.75rem; border-radius: 999px; font-family: var(--font-display); font-weight: 700; font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); text-decoration: none;">Developer</a>
    </nav>
  </header>
  <div class="meta-label" style="padding: 8px 20px 14px;">Sticky header · blur(14px) · rounded 1.4rem</div>
</body></html>
