<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="padding: 20px 24px;">
  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
    <div style="border: 1px solid color-mix(in oklab, var(--line) 82%, var(--ink) 18%); border-radius: var(--radius-lg); background: linear-gradient(180deg, var(--paper-soft), color-mix(in oklab, var(--paper) 95%, var(--paper-warm) 5%)); box-shadow: var(--shadow-md); padding: 12px 13px;">
      <div style="font-family: var(--font-display); font-weight: 700; font-size: 0.78rem; letter-spacing: -0.02em; margin-bottom: 4px;">Account</div>
      <div style="font-family: var(--font-body); font-size: 0.78rem; color: var(--ink-soft); line-height: 1.4;">Acme Labs · org with trust ceilings.</div>
    </div>
    <div style="border: 1px solid color-mix(in oklab, var(--line) 82%, var(--ink) 18%); border-radius: var(--radius-lg); background: linear-gradient(180deg, color-mix(in oklab, var(--accent-butter) 82%, white 18%), color-mix(in oklab, var(--paper) 90%, var(--accent-butter) 10%)); box-shadow: var(--shadow-md); padding: 12px 13px;">
      <div style="font-family: var(--font-display); font-weight: 700; font-size: 0.78rem; letter-spacing: -0.02em; margin-bottom: 4px;">Grant</div>
      <div style="font-family: var(--font-body); font-size: 0.78rem; color: var(--ink-soft); line-height: 1.4;">Warning variant — butter tint for attention.</div>
    </div>
    <div style="border: 1px solid color-mix(in oklab, var(--line) 82%, var(--ink) 18%); border-radius: var(--radius-lg); background: linear-gradient(180deg, var(--paper-soft), color-mix(in oklab, var(--paper) 92%, var(--accent-lime) 8%)); box-shadow: var(--shadow-md); padding: 12px 13px;">
      <div style="font-family: var(--font-display); font-weight: 700; font-size: 0.78rem; letter-spacing: -0.02em; margin-bottom: 4px;">Capability</div>
      <div style="font-family: var(--font-body); font-size: 0.78rem; color: var(--ink-soft); line-height: 1.4;">Soft lime for go / success.</div>
    </div>
  </div>
</body></html>
